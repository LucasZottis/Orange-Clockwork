<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Countdown - Chronos Focus</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@100..900&amp;family=Newsreader:ital,wght@0,200..800;1,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "on-secondary-container": "#526772",
                    "on-primary-fixed": "#410006",
                    "surface-bright": "#f9f9fe",
                    "tertiary": "#235d29",
                    "inverse-on-surface": "#f0f0f5",
                    "surface-variant": "#e2e2e7",
                    "secondary-fixed-dim": "#b4cad6",
                    "secondary-fixed": "#cfe6f2",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#002105",
                    "on-secondary-fixed": "#071e27",
                    "surface-container-high": "#e7e8ed",
                    "on-primary-fixed-variant": "#812729",
                    "tertiary-container": "#3c763f",
                    "on-tertiary-fixed-variant": "#16521f",
                    "tertiary-fixed": "#b2f2ae",
                    "primary": "#903233",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#ffdad8",
                    "primary-container": "#af4949",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e2e2e7",
                    "inverse-primary": "#ffb3b0",
                    "surface-tint": "#a03e3e",
                    "outline": "#897270",
                    "outline-variant": "#dcc0be",
                    "background": "#f9f9fe",
                    "on-background": "#191c1f",
                    "inverse-surface": "#2e3034",
                    "secondary-container": "#cfe6f2",
                    "surface-container": "#ededf2",
                    "on-tertiary-container": "#bafbb6",
                    "on-primary-container": "#ffe5e4",
                    "tertiary-fixed-dim": "#97d694",
                    "primary-fixed-dim": "#ffb3b0",
                    "surface": "#f9f9fe",
                    "on-surface-variant": "#564241",
                    "surface-dim": "#d9dade",
                    "on-surface": "#191c1f",
                    "secondary": "#4c616c",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed-variant": "#354a53",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f3f3f8",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Space Grotesk"],
                    "newsreader": ["Newsreader"],
                    "manrope": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-label { font-family: 'Space Grotesk', sans-serif; }
        .timer-glow { background: linear-gradient(135deg, #903233 0%, #af4949 100%); }
    </style>
</head>
<body class="bg-surface text-on-surface">
<!-- Top Navigation Bar - Components_10 style -->
<nav class="bg-[#150c0c] h-20 w-full sticky top-0 z-50 flex items-center">
<div class="flex justify-between items-center px-12 w-full max-w-screen-2xl mx-auto">
<div class="font-newsreader text-2xl font-bold italic text-[#f1dedd]">Chronos Focus</div>
<div class="hidden md:flex items-center gap-12">
<a class="text-[#f1dedd]/70 font-manrope text-sm uppercase tracking-widest hover:text-[#ffb3b0] transition-colors duration-300" href="#">Stopwatch</a>
<a class="text-[#f1dedd]/70 font-manrope text-sm uppercase tracking-widest hover:text-[#ffb3b0] transition-colors duration-300" href="#">Pomodoro</a>
<a class="text-[#ffb3b0] font-bold border-b-2 border-[#af4949] pb-1 font-manrope text-sm uppercase tracking-widest" href="#">Countdown</a>
</div>
<div class="flex items-center gap-6">
<button class="text-[#f1dedd]/70 hover:text-[#ffb3b0] transition-all active:opacity-80 active:scale-95">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="text-[#f1dedd]/70 hover:text-[#ffb3b0] transition-all active:opacity-80 active:scale-95">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="min-h-screen pt-8 pb-20 px-4 md:px-12 flex flex-col items-center justify-center">
<div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
<!-- Left Panel: Large Display -->
<div class="md:col-span-8 flex flex-col items-center justify-center relative">
<!-- SVG Progress Ring (Visual Indicator) -->
<div class="relative w-72 h-72 md:w-[450px] md:h-[450px] flex items-center justify-center">
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="stroke-outline-variant opacity-20" cx="50%" cy="50%" fill="transparent" r="48%" stroke-width="1.5"></circle>
<circle class="stroke-primary" cx="50%" cy="50%" fill="transparent" r="48%" stroke-dasharray="100 100" stroke-width="2.5" style="stroke-dasharray: 240, 1400; stroke-linecap: round;"></circle>
</svg>
<div class="flex flex-col items-center text-center z-10">
<span class="text-7xl md:text-9xl font-headline font-bold text-on-surface tracking-tighter">00:24:59</span>
<div class="mt-6 px-6 py-1.5 bg-tertiary-container/10 text-tertiary rounded-full font-label text-xs uppercase tracking-widest border border-tertiary/20">Focus Session Active</div>
</div>
</div>
<!-- Control Bar -->
<div class="mt-16 flex items-center gap-10">
<button class="group flex flex-col items-center gap-2">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface transition-transform group-hover:scale-105 active:scale-95">
<span class="material-symbols-outlined">close</span>
</div>
<span class="text-[10px] font-label uppercase tracking-wider text-slate-500">Cancel</span>
</button>
<button class="group flex flex-col items-center gap-2">
<div class="w-28 h-28 rounded-full timer-glow flex items-center justify-center text-white shadow-xl transition-transform group-hover:scale-105 active:scale-95">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</div>
<span class="text-[10px] font-label uppercase tracking-widest text-primary font-bold">Pause</span>
</button>
<button class="group flex flex-col items-center gap-2">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface transition-transform group-hover:scale-105 active:scale-95">
<span class="material-symbols-outlined">skip_next</span>
</div>
<span class="text-[10px] font-label uppercase tracking-wider text-slate-500">Skip</span>
</button>
</div>
</div>
<!-- Right Panel: Settings Bento -->
<div class="md:col-span-4 flex flex-col gap-6">
<!-- Time Input Card -->
<div class="bg-surface-container-low rounded-2xl p-8 border border-outline-variant/30">
<h3 class="font-headline font-bold text-sm mb-6 flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-primary text-xl">timer_10_alt_1</span>
                    Set Duration
                </h3>
<div class="grid grid-cols-3 gap-4">
<div class="flex flex-col gap-2">
<label class="text-[10px] font-label uppercase text-slate-400 text-center">Hours</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl text-center font-headline text-2xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest py-4 transition-all" type="text" value="00"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-[10px] font-label uppercase text-slate-400 text-center">Minutes</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl text-center font-headline text-2xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest py-4 transition-all" type="text" value="25"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-[10px] font-label uppercase text-slate-400 text-center">Seconds</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl text-center font-headline text-2xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest py-4 transition-all" type="text" value="00"/>
</div>
</div>
</div>
<!-- Sound Selection Card -->
<div class="bg-surface-container-low rounded-2xl p-8 border border-outline-variant/30">
<h3 class="font-headline font-bold text-sm mb-6 flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-primary text-xl">notification_important</span>
                    Alarm Sound
                </h3>
<div class="flex flex-col gap-3">
<button class="w-full flex items-center justify-between px-5 py-4 bg-surface-container-lowest rounded-xl border-l-4 border-primary shadow-sm">
<span class="text-sm font-label font-medium">Minimal Chime</span>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-highest transition-colors rounded-xl text-slate-600">
<span class="text-sm font-label">Zen Bowl</span>
<span class="material-symbols-outlined text-slate-300">play_circle</span>
</button>
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-highest transition-colors rounded-xl text-slate-600">
<span class="text-sm font-label">Distant Horizon</span>
<span class="material-symbols-outlined text-slate-300">play_circle</span>
</button>
</div>
</div>
<!-- Quick Presets -->
<div class="bg-surface-container-low rounded-2xl p-8 border border-outline-variant/30">
<h3 class="font-headline font-bold text-sm mb-6 flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-primary text-xl">history</span>
                    Recent Presets
                </h3>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 bg-secondary-container text-on-secondary-container rounded-lg text-xs font-label font-bold hover:brightness-95 transition-all">15:00</button>
<button class="px-5 py-2.5 bg-secondary-container text-on-secondary-container rounded-lg text-xs font-label font-bold hover:brightness-95 transition-all">45:00</button>
<button class="px-5 py-2.5 bg-secondary-container text-on-secondary-container rounded-lg text-xs font-label font-bold hover:brightness-95 transition-all">01:30:00</button>
</div>
</div>
</div>
</div>
</main>
<!-- Footer - Components_10 style -->
<footer class="bg-[#1a1111] w-full py-12 border-t border-[#f1dedd]/10">
<div class="flex flex-col md:flex-row justify-between items-center px-12 gap-6 w-full max-w-screen-2xl mx-auto">
<p class="text-[#f1dedd]/50 font-manrope text-xs tracking-wide">© 2024 Chronos Focus. The Obsidian Gallery.</p>
<div class="flex gap-10">
<a class="text-[#f1dedd]/50 hover:text-[#f1dedd] transition-opacity font-manrope text-xs tracking-wide" href="#">Privacy Policy</a>
<a class="text-[#f1dedd]/50 hover:text-[#f1dedd] transition-opacity font-manrope text-xs tracking-wide" href="#">Terms of Service</a>
<a class="text-[#f1dedd]/50 hover:text-[#f1dedd] transition-opacity font-manrope text-xs tracking-wide" href="#">Support</a>
</div>
</div>
</footer>
<!-- Bottom Navigation (Mobile Only) - Hidden as we have top nav now, but kept for mobile parity if needed -->
<div class="md:hidden fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-slate-100 flex justify-around items-center py-4 z-50">
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">timer</span>
<span class="text-[10px] font-label uppercase">Timer</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">hourglass_empty</span>
<span class="text-[10px] font-label uppercase">Pomo</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">schedule</span>
<span class="text-[10px] font-label font-bold uppercase">Focus</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-label uppercase">Prefs</span>
</button>
</div>
</body></html>
